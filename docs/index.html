<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change PDF Text</title>

  <link rel="stylesheet" href="./assets/css/base.css" />
  <link rel="stylesheet" href="./assets/css/layout.css" />
  <link rel="stylesheet" href="./assets/css/components.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>Change PDF Text</h1>
      <div class="hint">Double-click to add text</div>
    </header>

    <main class="main">
      <section id="uploadSection" class="upload-card">
        <h2>Drag and drop your PDF here</h2>
        <p>or click to browse your computer</p>
        <input id="pdfInput" type="file" accept="application/pdf" hidden />
        <button id="btnSelectFile" class="btn primary">Select File</button>
      </section>

      <section id="editorSection" class="editor hidden">
        <aside class="toolbar">
          <label for="fontFamily">Font</label>
          <select id="fontFamily">
            <option value="Helvetica">Helvetica</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier">Courier</option>
          </select>

          <div class="style-actions">
            <button id="btnBold" class="btn">B</button>
            <button id="btnItalic" class="btn">I</button>
            <button id="btnUnderline" class="btn">U</button>
          </div>

          <hr />

          <button id="btnBlankPage" class="btn">Blank Page</button>
          <button id="btnDuplicatePage" class="btn">Duplicate Page</button>
        </aside>

        <section class="canvas-area">
          <canvas id="pdfCanvas"></canvas>
        </section>
      </section>
    </main>

    <footer class="footer">
      <button id="btnReset" class="btn danger">Reset</button>
      <button id="btnSavePdf" class="btn success">Save PDF</button>
    </footer>
  </div>

  <!-- Librerie locali -->
  <script src="./vendor/pdfjs/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "./vendor/pdfjs/pdf.worker.min.js";
  </script>
  <script src="./vendor/pdflib/pdf-lib.min.js"></script>
  <script src="./vendor/fabric/fabric.min.js"></script>
  <script src="./vendor/jspdf/jspdf.umd.min.js"></script>

  <!-- App -->
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
